<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>魁地奇：終極對決</title>
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #1a1a2e; color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        
        #game-ui {
            position: absolute; top: 15px; width: 100%;
            display: none; flex-direction: column; align-items: center;
            pointer-events: none; z-index: 10;
        }
        .stats-row {
            display: flex; justify-content: space-between; width: 85%;
            font-size: 20px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .time { color: #e74c3c; }
        .score { color: #f1c40f; }
        
        #energy-container {
            width: 85%; height: 8px; background: rgba(0,0,0,0.5);
            border-radius: 4px; margin-top: 10px; border: 2px solid #34495e; overflow: hidden;
        }
        #energy-bar {
            width: 100%; height: 100%; background: #3498db; transition: width 0.1s linear;
        }
        .energy-infinite { background: #f1c40f !important; box-shadow: 0 0 10px #f1c40f; }

        canvas { display: block; background-color: #2e7d32; }
        
        .ctrl-overlay {
            position: absolute; bottom: 0; width: 100%; height: 160px;
            display: none; pointer-events: none; z-index: 10;
        }
        .joystick-base {
            position: absolute; bottom: 30px; left: 20px;
            width: 110px; height: 110px; background: rgba(255,255,255,0.15);
            border-radius: 50%; pointer-events: auto; border: 2px solid rgba(255,255,255,0.3);
        }
        .joystick-handle {
            width: 46px; height: 46px; background: rgba(255,255,255,0.7);
            border-radius: 50%; position: absolute; top: 32px; left: 32px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .boost-btn {
            position: absolute; bottom: 40px; right: 20px;
            width: 85px; height: 85px; background: linear-gradient(135deg, #e74c3c, #c0392b);
            border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; 
            font-size: 16px; font-weight: bold; pointer-events: auto; border: 4px solid #f1c40f;
            user-select: none; -webkit-tap-highlight-color: transparent; box-shadow: 0 6px 15px rgba(0,0,0,0.5);
        }
        .boost-btn:active { transform: scale(0.95); background: #c0392b; }

        .modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 20; text-align: center;
        }
        .modal h1 { color: #f1c40f; font-size: 32px; margin-bottom: 20px; }
        .house-btn {
            width: 70%; max-width: 250px; padding: 12px; margin: 8px; font-size: 18px; font-weight: bold;
            color: white; border: 2px solid #fff; border-radius: 10px; cursor: pointer;
        }
        .gryffindor { background: #c0392b; }
        .slytherin { background: #27ae60; }
        .ravenclaw { background: #2980b9; }
        .hufflepuff { background: #f39c12; color: #000; border-color: #000; }
        .restart-btn {
            padding: 12px 30px; font-size: 18px; font-weight: bold; margin-top: 20px;
            background: #f1c40f; color: #000; border: none; border-radius: 30px; pointer-events: auto;
        }
    </style>
</head>
<body>

    <div id="start-screen" class="modal">
        <h1>選擇你的學院</h1>
        <button class="house-btn gryffindor" onclick="selectHouse('#c0392b')">葛來分多</button>
        <button class="house-btn slytherin" onclick="selectHouse('#27ae60')">史萊哲林</button>
        <button class="house-btn ravenclaw" onclick="selectHouse('#2980b9')">雷文克勞</button>
        <button class="house-btn hufflepuff" onclick="selectHouse('#f39c12')">赫夫帕夫</button>
    </div>

    <div id="game-ui">
        <div class="stats-row">
            <div class="time">⏳ <span id="timer">60</span>s</div>
            <div class="score">🏆 <span id="score">0</span></div>
        </div>
        <div id="energy-container"><div id="energy-bar"></div></div>
    </div>

    <div id="game-over" class="modal" style="display: none;">
        <h1>時間到！</h1>
        <p style="font-size: 22px;">最終得分: <span id="final-score">0</span></p>
        <button class="restart-btn" onclick="showStartScreen()">重新選擇學院</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="ctrl-overlay" id="ctrl-overlay">
        <div class="joystick-base" id="joyBase"><div class="joystick-handle" id="joyHandle"></div></div>
        <div class="boost-btn" id="boostBtn">衝刺!</div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        // 🔊 音效系統
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            
            if (type === 'catch') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(1600, now + 0.1);
                gainNode.gain.setValueAtTime(0.3, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'hit') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(50, now + 0.2);
                gainNode.gain.setValueAtTime(0.4, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'powerup') {
                osc.type = 'square'; osc.frequency.setValueAtTime(400, now); osc.frequency.setValueAtTime(600, now + 0.1); osc.frequency.setValueAtTime(1000, now + 0.2);
                gainNode.gain.setValueAtTime(0.2, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'over') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.5);
                gainNode.gain.setValueAtTime(0.2, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.start(now); osc.stop(now + 0.5);
            }
        }

        let gameState = 'start'; 
        let score = 0, timeLeft = 60, timerInterval;
        let seekerColor = '#c0392b';
        let seeker, snitch, bludgers, potion;
        let floatingTexts = [];

        function initGameObjects() {
            let w = canvas.width, h = canvas.height;
            seeker = {
                x: w * 0.5, y: h * 0.75, radius: 14, color: seekerColor,
                baseSpeed: 4, boostSpeed: 8.5, dx: 0, dy: 0, isBoosting: false,
                energy: 100, isStunned: false, stunTimer: 0,
                isInvincible: false, invincibleTimer: 0 // 新增無敵狀態
            };
            snitch = { x: w * 0.5, y: h * 0.25, radius: 6, color: '#f1c40f', dx: 4, dy: 4, changeDirTimer: 0 };
            bludgers = [
                { x: w * 0.8, y: h * 0.2, radius: 11, color: '#2c3e50', dx: -4, dy: 5 },
                { x: w * 0.2, y: h * 0.8, radius: 11, color: '#2c3e50', dx: 4, dy: -5 }
            ];
            potion = null; // 幸運魔藥初始為空
            floatingTexts = [];
        }

        function showStartScreen() {
            document.getElementById('game-over').style.display = 'none';
            document.getElementById('start-screen').style.display = 'flex';
            document.getElementById('game-ui').style.display = 'none';
            document.getElementById('ctrl-overlay').style.display = 'none';
        }

        function selectHouse(color) {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            seekerColor = color; document.getElementById('start-screen').style.display = 'none'; startGame();
        }

        function startGame() {
            gameState = 'playing'; score = 0; timeLeft = 60;
            document.getElementById('score').innerText = score;
            document.getElementById('timer').innerText = timeLeft;
            document.querySelector('.time').style.color = '#e74c3c';
            document.getElementById('game-ui').style.display = 'flex';
            document.getElementById('ctrl-overlay').style.display = 'flex';
            initGameObjects();
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (gameState === 'playing' && timeLeft > 0) {
                    timeLeft--; document.getElementById('timer').innerText = timeLeft;
                    if (timeLeft <= 10) document.querySelector('.time').style.color = 'red';
                } else if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function endGame() {
            gameState = 'over'; playSound('over');
            document.getElementById('game-ui').style.display = 'none';
            document.getElementById('ctrl-overlay').style.display = 'none';
            document.getElementById('game-over').style.display = 'flex';
            document.getElementById('final-score').innerText = score;
        }

        // 搖桿輸入
        const joyBase = document.getElementById('joyBase'), joyHandle = document.getElementById('joyHandle');
        let joyActive = false;
        joyBase.addEventListener('touchstart', (e) => { e.preventDefault(); joyActive = true; });
        document.addEventListener('touchmove', (e) => {
            if (!joyActive || gameState !== 'playing') return;
            e.preventDefault();
            const touch = e.touches[0], rect = joyBase.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2, centerY = rect.top + rect.height / 2;
            let deltaX = touch.clientX - centerX, deltaY = touch.clientY - centerY;
            const distance = Math.min(55, Math.hypot(deltaX, deltaY)), angle = Math.atan2(deltaY, deltaX);
            joyHandle.style.transform = `translate(${Math.cos(angle) * distance}px, ${Math.sin(angle) * distance}px)`;
            seeker.dx = (Math.cos(angle) * distance) / 55; seeker.dy = (Math.sin(angle) * distance) / 55;
        }, { passive: false });
        document.addEventListener('touchend', () => {
            joyActive = false; joyHandle.style.transform = `translate(0,0)`;
            if (seeker) { seeker.dx = 0; seeker.dy = 0; }
        });

        const boostBtn = document.getElementById('boostBtn');
        boostBtn.addEventListener('touchstart', (e) => { e.preventDefault(); if(seeker) seeker.isBoosting = true; });
        boostBtn.addEventListener('touchend', (e) => { e.preventDefault(); if(seeker) seeker.isBoosting = false; });

        function update() {
            if (gameState !== 'playing') return;

            // --- 玩家狀態與移動 ---
            if (seeker.isStunned) {
                if (--seeker.stunTimer <= 0) seeker.isStunned = false;
            } else {
                let speed = seeker.baseSpeed;
                
                // 無敵星狀態邏輯
                if (seeker.isInvincible) {
                    seeker.invincibleTimer--;
                    seeker.energy = 100; // 無敵時體力鎖定 100
                    document.getElementById('energy-bar').classList.add('energy-infinite');
                    if (seeker.invincibleTimer <= 0) {
                        seeker.isInvincible = false;
                        document.getElementById('energy-bar').classList.remove('energy-infinite');
                    }
                }

                if (seeker.isBoosting && seeker.energy > 0) {
                    speed = seeker.boostSpeed;
                    if (!seeker.isInvincible) seeker.energy -= 1.5;
                } else if (!seeker.isInvincible) {
                    seeker.energy = Math.min(100, seeker.energy + 0.5);
                }
                
                document.getElementById('energy-bar').style.width = seeker.energy + '%';
                seeker.x += seeker.dx * speed; seeker.y += seeker.dy * speed;
            }
            seeker.x = Math.max(seeker.radius, Math.min(canvas.width - seeker.radius, seeker.x));
            seeker.y = Math.max(seeker.radius, Math.min(canvas.height - seeker.radius, seeker.y));

            // --- 魔藥系統 (生成與吃掉) ---
            if (!potion && Math.random() < 0.002) { // 隨機低機率生成
                potion = {
                    x: Math.random() * (canvas.width - 60) + 30, y: Math.random() * (canvas.height - 150) + 50,
                    radius: 10, life: 400, floatY: 0
                };
            }
            if (potion) {
                potion.life--;
                potion.floatY = Math.sin(potion.life * 0.1) * 3; // 讓魔藥上下浮動
                if (potion.life <= 0) potion = null; // 沒吃到就消失
                else if (!seeker.isStunned && Math.hypot(seeker.x - potion.x, seeker.y - (potion.y + potion.floatY)) < seeker.radius + potion.radius) {
                    playSound('powerup');
                    seeker.isInvincible = true; seeker.invincibleTimer = 300; // 5秒無敵
                    floatingTexts.push({ x: potion.x, y: potion.y, text: "無敵!", color: "#2ecc71", life: 45 });
                    potion = null;
                }
            }

            // --- 浮動字體特效更新 ---
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                floatingTexts[i].y -= 1; floatingTexts[i].life--;
                if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
            }

            // --- 金探子 AI & 絕對邊界防穿牆 ---
            let distToSeeker = Math.hypot(seeker.x - snitch.x, seeker.y - snitch.y);
            if (distToSeeker < 150 && !seeker.isStunned) {
                let angleAway = Math.atan2(snitch.y - seeker.y, snitch.x - seeker.x);
                snitch.dx = Math.cos(angleAway) * 6.5; snitch.dy = Math.sin(angleAway) * 6.5;
            } else {
                if (++snitch.changeDirTimer > 40) {
                    snitch.dx += (Math.random() - 0.5) * 8; snitch.dy += (Math.random() - 0.5) * 8;
                    snitch.changeDirTimer = 0;
                }
                snitch.dx = Math.max(-5, Math.min(5, snitch.dx)); snitch.dy = Math.max(-5, Math.min(5, snitch.dy));
            }
            snitch.x += snitch.dx; snitch.y += snitch.dy;
            
            // 防穿牆：先反轉速度，再硬性限制座標
            if (snitch.x < snitch.radius || snitch.x > canvas.width - snitch.radius) snitch.dx *= -1;
            if (snitch.y < snitch.radius || snitch.y > canvas.height - snitch.radius) snitch.dy *= -1;
            snitch.x = Math.max(snitch.radius, Math.min(canvas.width - snitch.radius, snitch.x));
            snitch.y = Math.max(snitch.radius, Math.min(canvas.height - snitch.radius, snitch.y));

            // --- 搏格碰撞 (考慮無敵) ---
            bludgers.forEach(b => {
                b.x += b.dx; b.y += b.dy;
                if (b.x < b.radius || b.x > canvas.width - b.radius) b.dx *= -1;
                if (b.y < b.radius || b.y > canvas.height - b.radius) b.dy *= -1;
                
                // 只有在沒暈眩且沒有無敵星時才會被打中
                if (!seeker.isStunned && !seeker.isInvincible && Math.hypot(seeker.x - b.x, seeker.y - b.y) < seeker.radius + b.radius) {
                    playSound('hit');
                    seeker.isStunned = true; seeker.stunTimer = 60; 
                    seeker.x -= Math.sign(b.dx) * 20; seeker.y -= Math.sign(b.dy) * 20;
                }
            });

            // --- 抓到金探子 ---
            if (!seeker.isStunned && distToSeeker < seeker.radius + snitch.radius) {
                playSound('catch');
                score += 150; document.getElementById('score').innerText = score;
                floatingTexts.push({ x: snitch.x, y: snitch.y, text: "+150", color: "#f1c40f", life: 45 });
                
                snitch.x = Math.random() * (canvas.width - 40) + 20;
                snitch.y = Math.random() * (canvas.height - 150) + 50; 
                bludgers.forEach(b => {
                    b.dx = Math.sign(b.dx) * (Math.abs(b.dx) + 0.4);
                    b.dy = Math.sign(b.dy) * (Math.abs(b.dy) + 0.4);
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (gameState !== 'playing') return;
            
            // 畫球場線
            ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, canvas.height / 2); ctx.lineTo(canvas.width, canvas.height / 2); ctx.stroke();
            ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, 50, 0, Math.PI*2); ctx.stroke();

            // 畫魔藥
            if (potion) {
                ctx.beginPath(); ctx.arc(potion.x, potion.y + potion.floatY, potion.radius, 0, Math.PI*2);
                ctx.fillStyle = '#2ecc71'; ctx.shadowBlur = (potion.life % 20 < 10) ? 15 : 5; ctx.shadowColor = '#2ecc71';
                ctx.fill(); ctx.shadowBlur = 0;
                ctx.fillStyle = 'white'; ctx.font = '12px Arial'; ctx.textAlign = 'center'; ctx.fillText('+', potion.x, potion.y + potion.floatY + 4);
            }

            // 畫金探子
            ctx.beginPath(); ctx.arc(snitch.x, snitch.y, snitch.radius, 0, Math.PI*2);
            ctx.fillStyle = snitch.color; ctx.shadowBlur = 15; ctx.shadowColor = '#f1c40f'; ctx.fill(); ctx.shadowBlur = 0;

            // 畫搏格
            bludgers.forEach(b => {
                ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2); ctx.fillStyle = b.color; ctx.fill();
            });

            // 畫搜捕手
            ctx.beginPath(); ctx.arc(seeker.x, seeker.y, seeker.radius, 0, Math.PI*2);
            ctx.fillStyle = seeker.isStunned ? '#95a5a6' : seeker.color; ctx.fill();
            ctx.lineWidth = 3; 
            
            // 無敵星視覺特效：外框變成閃爍金色
            if (seeker.isInvincible) {
                ctx.strokeStyle = (Math.floor(Date.now() / 100) % 2 === 0) ? '#f1c40f' : '#ffffff';
                ctx.lineWidth = 4;
            } else {
                ctx.strokeStyle = '#f1c40f';
            }
            ctx.stroke();

            if (seeker.isStunned) {
                ctx.fillStyle = 'white'; ctx.font = '16px Arial'; ctx.textAlign = 'center';
                ctx.fillText('😵', seeker.x, seeker.y - 18);
            }

            // 畫浮動特效字體
            floatingTexts.forEach(ft => {
                ctx.fillStyle = ft.color; ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center';
                ctx.globalAlpha = ft.life / 45; // 逐漸變透明
                ctx.fillText(ft.text, ft.x, ft.y);
                ctx.globalAlpha = 1.0;
            });
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();
    </script>
</body>
</html>

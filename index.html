<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>魁地奇：進化版</title>

<style>
body {
    margin: 0; overflow: hidden;
    background: #111;
    touch-action: none;
    font-family: sans-serif;
}

/* UI */
#game-ui {
    position: absolute;
    top: 10px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 18px;
}

#energy {
    height: 6px;
    background: #3498db;
    margin: 6px auto;
    width: 80%;
}

/* 控制 */
.ctrl {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 160px;
}

#joyBase {
    position: absolute;
    left: 20px;
    bottom: 20px;
    width: 100px;
    height: 100px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
}

#joyHandle {
    width: 40px;
    height: 40px;
    background: white;
    border-radius: 50%;
    position: absolute;
    top: 30px;
    left: 30px;
}

#boost {
    position: absolute;
    right: 20px;
    bottom: 30px;
    width: 80px;
    height: 80px;
    background: red;
    border-radius: 50%;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
}
</style>
</head>

<body>

<div id="game-ui">
    ⏳ <span id="time">60</span> | 🏆 <span id="score">0</span>
    <div id="energy"></div>
</div>

<canvas id="c"></canvas>

<div class="ctrl">
    <div id="joyBase"><div id="joyHandle"></div></div>
    <div id="boost">BOOST</div>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

/* ===== 遊戲狀態 ===== */
let score = 0;
let timeLeft = 60;

let seeker = {
    x: 200, y: 400,
    dx:0, dy:0,
    vx:0, vy:0,
    energy:100,
    boosting:false,
    radius:12
};

let snitch = {x:150,y:200,dx:4,dy:4,r:6};
let bludgers = [
    {x:300,y:200,dx:4,dy:5,r:10},
    {x:100,y:500,dx:-4,dy:-5,r:10}
];

/* ===== 搖桿 ===== */
let joyActive=false;

joyBase.ontouchstart=()=>joyActive=true;
ontouchend=()=>{joyActive=false; seeker.dx=seeker.dy=0;};

ontouchmove=e=>{
    if(!joyActive)return;
    const t=e.touches[0];
    const r=joyBase.getBoundingClientRect();
    let dx=t.clientX-(r.left+r.width/2);
    let dy=t.clientY-(r.top+r.height/2);

    const dist=Math.min(50,Math.hypot(dx,dy));
    const angle=Math.atan2(dy,dx);

    joyHandle.style.transform=
        `translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px)`;

    seeker.dx=Math.cos(angle);
    seeker.dy=Math.sin(angle);
};

/* ===== Boost ===== */
boost.ontouchstart=()=>seeker.boosting=true;
boost.ontouchend=()=>seeker.boosting=false;

/* ===== 主迴圈 ===== */
let last=0;
function loop(t){
    const delta=(t-last)/16.67;
    last=t;

    update(delta);
    draw();

    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* ===== 更新 ===== */
function update(d){

    timeLeft-=0.016*d;
    if(timeLeft<=0)return;

    document.getElementById("time").innerText=Math.floor(timeLeft);

    let speed=4;
    if(seeker.boosting && seeker.energy>0){
        speed=8;
        seeker.energy-=2*d;
    }else{
        seeker.energy=Math.min(100,seeker.energy+0.5*d);
    }

    energy.style.width=seeker.energy+"%";

    /* 慣性 */
    seeker.vx += (seeker.dx*speed - seeker.vx)*0.2;
    seeker.vy += (seeker.dy*speed - seeker.vy)*0.2;

    seeker.x += seeker.vx*d;
    seeker.y += seeker.vy*d;

    /* 邊界 */
    seeker.x=Math.max(0,Math.min(canvas.width,seeker.x));
    seeker.y=Math.max(0,Math.min(canvas.height,seeker.y));

    /* 難度成長 */
    let diff=1+(60-timeLeft)/30;

    /* 金探子AI */
    let dist=Math.hypot(seeker.x-snitch.x,seeker.y-snitch.y);

    if(dist<150){
        let ang=Math.atan2(snitch.y-seeker.y,snitch.x-seeker.x);
        ang+=(Math.random()-0.5)*0.5;
        snitch.dx=Math.cos(ang)*6*diff;
        snitch.dy=Math.sin(ang)*6*diff;
    }

    snitch.x+=snitch.dx*d;
    snitch.y+=snitch.dy*d;

    /* 撞牆 */
    if(snitch.x<0||snitch.x>canvas.width)snitch.dx*=-1;
    if(snitch.y<0||snitch.y>canvas.height)snitch.dy*=-1;

    /* 搏格 */
    bludgers.forEach(b=>{
        b.x+=b.dx*d;
        b.y+=b.dy*d;

        if(b.x<0||b.x>canvas.width)b.dx*=-1;
        if(b.y<0||b.y>canvas.height)b.dy*=-1;

        if(Math.hypot(seeker.x-b.x,seeker.y-b.y)<20){
            if(navigator.vibrate)navigator.vibrate(100);
            seeker.vx*=-2;
            seeker.vy*=-2;
        }
    });

    /* 抓到 */
    if(dist<20){
        score+=150;
        document.getElementById("score").innerText=score;

        snitch.x=Math.random()*canvas.width;
        snitch.y=Math.random()*canvas.height;
    }
}

/* ===== 繪圖 ===== */
function draw(){

    /* 漸層背景 */
    let g=ctx.createLinearGradient(0,0,0,canvas.height);
    g.addColorStop(0,"#1e8449");
    g.addColorStop(1,"#145a32");
    ctx.fillStyle=g;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    /* 金探子 */
    ctx.globalAlpha=0.7+Math.sin(Date.now()*0.01)*0.3;
    ctx.beginPath();
    ctx.arc(snitch.x,snitch.y,snitch.r,0,Math.PI*2);
    ctx.fillStyle="gold";
    ctx.fill();
    ctx.globalAlpha=1;

    /* 搏格 */
    bludgers.forEach(b=>{
        ctx.beginPath();
        ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
        ctx.fillStyle="black";
        ctx.fill();
    });

    /* 玩家 */
    ctx.beginPath();
    ctx.arc(seeker.x,seeker.y,seeker.radius,0,Math.PI*2);
    ctx.fillStyle="red";
    ctx.fill();
}
</script>

</body>
</html>
